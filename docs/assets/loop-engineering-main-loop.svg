<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Loop Engineering：AI 推进、Harness 控制的软件开发闭环</title>
  <desc id="desc">三泳道展示人、AI Agent 与 App Runner Harness 如何协作完成需求梳理、交付规划、方案分析、开发、验证与结卡。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#15233c" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,6 L0,12 z" fill="#2868c7"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f9d62"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,6 L0,12 z" fill="#dc3f46"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,6 L0,12 z" fill="#e08a00"/>
    </marker>
    <style>
      .bg { fill:#fbfcff; }
      .title { font:700 50px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#121927; }
      .subtitle { font:400 22px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#68758a; }
      .lane-title { font:700 28px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; }
      .node-title { font:700 24px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#183a71; }
      .node-caption { font:400 17px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#53627a; }
      .human-title { fill:#b85a10; }
      .system-title { fill:#49358d; }
      .decision-text { font:700 21px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#173e78; text-anchor:middle; }
      .edge-label { font:600 17px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#526177; }
      .edge-label-red { font:700 17px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#c8343b; }
      .edge-label-green { font:700 17px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; fill:#188252; }
      .flow { fill:none; stroke:#2868c7; stroke-width:4; marker-end:url(#arrow-blue); }
      .success { fill:none; stroke:#1f9d62; stroke-width:4; marker-end:url(#arrow-green); }
      .rewind { fill:none; stroke:#dc3f46; stroke-width:3.5; stroke-dasharray:10 8; marker-end:url(#arrow-red); }
      .wait { fill:none; stroke:#e08a00; stroke-width:3.5; stroke-dasharray:9 8; marker-end:url(#arrow-orange); }
      .ai-node { fill:#fff; stroke:#3c72c8; stroke-width:2.5; rx:16; filter:url(#shadow); }
      .human-node { fill:#fffaf5; stroke:#e87520; stroke-width:2.5; rx:16; filter:url(#shadow); }
      .system-node { fill:#fff; stroke:#6650ad; stroke-width:2.5; rx:16; filter:url(#shadow); }
      .decision { fill:#fff; stroke:#3c72c8; stroke-width:2.5; filter:url(#shadow); }
      .small-label { font:600 16px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="2400" height="1350"/>
  <text class="title" x="1200" y="70" text-anchor="middle">Loop Engineering：AI 推进、Harness 控制的软件开发闭环</text>
  <text class="subtitle" x="1200" y="105" text-anchor="middle">每次只推进一个决策完备、可以独立验证的最小交付单元</text>

  <!-- Swimlanes -->
  <rect x="20" y="125" width="2360" height="185" rx="20" fill="#fff9f3" stroke="#f1b487" stroke-width="2"/>
  <rect x="20" y="330" width="2360" height="560" rx="20" fill="#f5f9ff" stroke="#99bdf0" stroke-width="2"/>
  <rect x="20" y="910" width="2360" height="245" rx="20" fill="#f8f6ff" stroke="#b5a9e1" stroke-width="2"/>
  <line x1="125" y1="125" x2="125" y2="310" stroke="#f1b487" stroke-width="2"/>
  <line x1="125" y1="330" x2="125" y2="890" stroke="#99bdf0" stroke-width="2"/>
  <line x1="125" y1="910" x2="125" y2="1155" stroke="#b5a9e1" stroke-width="2"/>
  <circle cx="72" cy="178" r="20" fill="#e66f16"/>
  <path d="M42 235 Q72 195 102 235 L102 258 L42 258 Z" fill="#e66f16"/>
  <text class="lane-title human-title" x="72" y="292" text-anchor="middle">人</text>
  <rect x="43" y="405" width="58" height="48" rx="13" fill="#2e66bd"/>
  <circle cx="61" cy="430" r="5" fill="#fff"/><circle cx="83" cy="430" r="5" fill="#fff"/>
  <path d="M58 445 Q72 455 86 445" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="390" x2="72" y2="405" stroke="#2e66bd" stroke-width="5"/><circle cx="72" cy="383" r="7" fill="#2e66bd"/>
  <text class="lane-title" x="72" y="500" text-anchor="middle" fill="#23579f">AI</text>
  <text class="lane-title" x="72" y="534" text-anchor="middle" fill="#23579f">Agent</text>
  <path d="M45 978 H99 V1025 H45 Z M55 988 H89 M55 1000 H89 M55 1012 H89" fill="none" stroke="#59439b" stroke-width="7" stroke-linecap="round"/>
  <text class="lane-title system-title" x="72" y="1070" text-anchor="middle">App</text>
  <text class="lane-title system-title" x="72" y="1103" text-anchor="middle">Runner</text>
  <text class="lane-title system-title" x="72" y="1136" text-anchor="middle">Harness</text>

  <!-- Human nodes -->
  <rect class="human-node" x="155" y="175" width="170" height="80"/>
  <text class="node-title human-title" x="240" y="224" text-anchor="middle">提出需求</text>

  <rect class="human-node" x="915" y="165" width="230" height="100"/>
  <text class="node-title human-title" x="1030" y="207" text-anchor="middle">批量回答歧义</text>
  <text class="node-caption" x="1030" y="239" text-anchor="middle">形成新的决策事实</text>

  <rect class="human-node" x="1795" y="165" width="220" height="100"/>
  <text class="node-title human-title" x="1905" y="207" text-anchor="middle">阅读最新版报告</text>
  <text class="node-caption" x="1905" y="239" text-anchor="middle">知晓最终交付事实</text>

  <polygon class="decision" points="2130,155 2190,215 2130,275 2070,215" stroke="#e87520"/>
  <text class="decision-text human-title" x="2130" y="207">有评论？</text>

  <rect class="human-node" x="2220" y="175" width="145" height="80"/>
  <text class="node-title human-title" x="2292" y="208" text-anchor="middle">阅读确认</text>
  <text class="node-caption" x="2292" y="238" text-anchor="middle">并关闭需求</text>

  <!-- AI main nodes -->
  <rect class="ai-node" x="155" y="500" width="170" height="100"/>
  <text class="node-title" x="240" y="541" text-anchor="middle">需求梳理</text>
  <text class="node-caption" x="240" y="571" text-anchor="middle">理解、探索、分类</text>

  <polygon class="decision" points="395,495 450,550 395,605 340,550"/>
  <text class="decision-text" x="395" y="542">需求</text>
  <text class="decision-text" x="395" y="568">类型？</text>

  <rect class="ai-node" x="335" y="365" width="180" height="90"/>
  <text class="node-title" x="425" y="403" text-anchor="middle">问题复现</text>
  <text class="node-caption" x="425" y="432" text-anchor="middle">复现现象，保存证据</text>

  <rect class="ai-node" x="555" y="500" width="175" height="100"/>
  <text class="node-title" x="642" y="541" text-anchor="middle">交付规划</text>
  <text class="node-caption" x="642" y="571" text-anchor="middle">拆成最小业务闭环</text>

  <rect class="ai-node" x="770" y="500" width="185" height="100"/>
  <text class="node-title" x="862" y="541" text-anchor="middle">方案分析</text>
  <text class="node-caption" x="862" y="571" text-anchor="middle">探索代码，生成规格</text>

  <polygon class="decision" points="1030,490 1090,550 1030,610 970,550"/>
  <text class="decision-text" x="1030" y="529">存在产品</text>
  <text class="decision-text" x="1030" y="557">歧义？</text>

  <rect class="ai-node" x="1140" y="500" width="170" height="100"/>
  <text class="node-title" x="1225" y="541" text-anchor="middle">规格就绪</text>
  <text class="node-caption" x="1225" y="571" text-anchor="middle">歧义归零，验收可执行</text>

  <rect class="ai-node" x="1340" y="500" width="170" height="100"/>
  <text class="node-title" x="1425" y="541" text-anchor="middle">开发实现</text>
  <text class="node-caption" x="1425" y="571" text-anchor="middle">只补齐规格缺口</text>

  <rect class="ai-node" x="1800" y="500" width="190" height="100"/>
  <text class="node-title" x="1895" y="541" text-anchor="middle">结卡报告</text>
  <text class="node-caption" x="1895" y="571" text-anchor="middle">范围、决策、证据、风险</text>
  <rect x="1818" y="625" width="155" height="42" rx="21" fill="#f4f0ff" stroke="#755eb7" stroke-width="2"/>
  <text class="small-label" x="1895" y="652" text-anchor="middle" fill="#5a429a">立即释放代码槽</text>

  <!-- Review comment routing panel -->
  <rect x="2020" y="350" width="335" height="525" rx="18" fill="#fffafb" stroke="#dc3f46" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="2187" y="391" text-anchor="middle" font-family="PingFang SC,Noto Sans CJK SC,Microsoft YaHei,sans-serif" font-size="24" font-weight="700" fill="#b82931">评论影响哪一层？</text>
  <rect x="2040" y="420" width="295" height="66" rx="12" fill="#fff" stroke="#ed7a7f" stroke-width="2"/>
  <text class="small-label" x="2187" y="449" text-anchor="middle" fill="#ba3037">交付边界 → 规划</text>
  <text class="node-caption" x="2187" y="474" text-anchor="middle">重新划分交付单元</text>
  <rect x="2040" y="500" width="295" height="66" rx="12" fill="#fff" stroke="#ed7a7f" stroke-width="2"/>
  <text class="small-label" x="2187" y="529" text-anchor="middle" fill="#ba3037">规格决策 → 分析</text>
  <text class="node-caption" x="2187" y="554" text-anchor="middle">重建 Slice Spec</text>
  <rect x="2040" y="580" width="295" height="66" rx="12" fill="#fff" stroke="#ed7a7f" stroke-width="2"/>
  <text class="small-label" x="2187" y="609" text-anchor="middle" fill="#ba3037">实现问题 → 开发</text>
  <text class="node-caption" x="2187" y="634" text-anchor="middle">补齐实现缺口</text>
  <rect x="2040" y="660" width="295" height="66" rx="12" fill="#fff" stroke="#ed7a7f" stroke-width="2"/>
  <text class="small-label" x="2187" y="689" text-anchor="middle" fill="#ba3037">证据问题 → 验证</text>
  <text class="node-caption" x="2187" y="714" text-anchor="middle">重新获得验证证据</text>
  <rect x="2040" y="750" width="295" height="78" rx="12" fill="#fff7f2" stroke="#e87520" stroke-width="2"/>
  <text class="small-label" x="2187" y="783" text-anchor="middle" fill="#b85a10">仅报告内容 → 新版报告</text>
  <text class="node-caption" x="2187" y="811" text-anchor="middle">不回退开发流程</text>

  <!-- System nodes -->
  <rect class="system-node" x="1320" y="970" width="190" height="105"/>
  <text class="node-title system-title" x="1415" y="1014" text-anchor="middle">Harness 验证</text>
  <text class="node-caption" x="1415" y="1045" text-anchor="middle">测试、构建、静态检查</text>

  <rect class="system-node" x="1550" y="970" width="190" height="105"/>
  <text class="node-title system-title" x="1645" y="1014" text-anchor="middle">独立验证</text>
  <text class="node-caption" x="1645" y="1045" text-anchor="middle">黑盒与回归验证</text>

  <polygon class="decision" points="1830,955 1900,1025 1830,1095 1760,1025" stroke="#6650ad"/>
  <text class="decision-text system-title" x="1830" y="1006">还有交付</text>
  <text class="decision-text system-title" x="1830" y="1035">单元？</text>

  <!-- Main forward connectors -->
  <path class="wait" d="M240 255 L240 500"/>
  <path class="flow" d="M325 550 L340 550"/>
  <path class="flow" d="M450 550 L555 550"/>
  <text class="edge-label" x="490" y="578">Feature / Tech</text>
  <path class="flow" d="M395 495 L395 455"/>
  <text class="edge-label" x="407" y="482">Bug</text>
  <path class="flow" d="M515 410 L535 410 L535 550 L555 550"/>
  <path class="flow" d="M730 550 L770 550"/>
  <path class="flow" d="M955 550 L970 550"/>
  <path class="success" d="M1090 550 L1140 550"/>
  <text class="edge-label-green" x="1100" y="531">没有</text>
  <path class="wait" d="M1030 490 L1030 265"/>
  <text x="1047" y="373" class="small-label" fill="#b56e00">有</text>
  <path class="wait" d="M915 215 L750 215 L750 550 L770 550"/>
  <path class="flow" d="M1310 550 L1340 550"/>
  <path class="flow" d="M1425 600 L1425 970"/>
  <path class="flow" d="M1510 1023 L1550 1023"/>
  <path class="flow" d="M1740 1023 L1760 1023"/>
  <path class="success" d="M1830 955 L1830 900 L1895 900 L1895 600"/>
  <text class="edge-label-green" x="1847" y="930">没有</text>
  <path class="success" d="M1830 1095 L1830 1125 L862 1125 L862 600"/>
  <text class="edge-label-green" x="1310" y="1113">有：进入下一个交付单元</text>
  <path class="wait" d="M1895 500 L1895 265"/>
  <path class="flow" d="M2015 215 L2070 215"/>
  <path class="success" d="M2190 215 L2220 215"/>
  <text class="edge-label-green" x="2194" y="196">没有</text>
  <path class="rewind" d="M2130 275 L2130 350"/>
  <text class="edge-label-red" x="2145" y="318">有</text>

  <!-- Verification rewinds -->
  <path class="rewind" d="M1320 1023 L1265 1023 L1265 650 L1425 650 L1425 600"/>
  <text class="edge-label-red" x="1278" y="996">失败</text>
  <path class="rewind" d="M1645 970 L1645 690 L1465 690 L1465 600"/>
  <text class="edge-label-red" x="1500" y="677">实现问题</text>
  <path class="rewind" d="M1550 1045 L1515 1045 L1515 855 L862 855 L862 600"/>
  <text class="edge-label-red" x="1170" y="842">规格问题</text>

  <!-- Footer legend -->
  <path class="flow" d="M55 1205 L125 1205"/>
  <text class="edge-label" x="142" y="1211">推进</text>
  <path class="rewind" d="M225 1205 L295 1205"/>
  <text class="edge-label" x="312" y="1211">自动回退</text>
  <path class="success" d="M435 1205 L505 1205"/>
  <text class="edge-label" x="522" y="1211">通过 / 完成</text>
  <path class="wait" d="M680 1205 L750 1205"/>
  <text class="edge-label" x="767" y="1211">等待人工输入</text>

  <rect x="35" y="1240" width="1445" height="82" rx="18" fill="#f6f3ff" stroke="#5e48a4" stroke-width="2.5"/>
  <text x="757" y="1292" text-anchor="middle" font-family="PingFang SC,Noto Sans CJK SC,Microsoft YaHei,sans-serif" font-size="27" font-weight="700" fill="#49358d">确定性调度 · 状态持久化 · 单代码槽 · 可恢复执行 · 结构化结果 · 全程证据留存</text>

  <rect x="1510" y="1185" width="855" height="137" rx="20" fill="#fff" stroke="#49358d" stroke-width="3"/>
  <rect x="1510" y="1185" width="155" height="137" rx="18" fill="#49358d"/>
  <text x="1588" y="1269" text-anchor="middle" font-family="PingFang SC,Noto Sans CJK SC,Microsoft YaHei,sans-serif" font-size="42" font-weight="800" fill="#fff">AI</text>
  <text x="1695" y="1228" font-family="PingFang SC,Noto Sans CJK SC,Microsoft YaHei,sans-serif" font-size="24" font-weight="700" fill="#252a35">AI 负责推进</text>
  <text x="1695" y="1264" font-family="PingFang SC,Noto Sans CJK SC,Microsoft YaHei,sans-serif" font-size="24" font-weight="700" fill="#252a35">Harness 根据证据判断完成</text>
  <text x="1695" y="1300" font-family="PingFang SC,Noto Sans CJK SC,Microsoft YaHei,sans-serif" font-size="24" font-weight="700" fill="#252a35">人只消除歧义并阅读交付</text>
</svg>
